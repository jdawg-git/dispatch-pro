<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <title>Dispatch Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>DISPATCH PRO</h1>
  </header>

  <main class="app-main">
    <section class="controls-bar" aria-label="Map controls">
      <label class="control">
        <span>Grid</span>
        <select id="grid-size">
          <option value="5">5×5</option>
          <option value="7">7×7</option>
          <option value="9" selected>9×9</option>
          <option value="11">11×11</option>
          <option value="13">13×13</option>
        </select>
      </label>
      <label class="control">
        <span>Difficulty</span>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <button id="generate-btn" class="btn btn-primary" type="button">Generate New Map</button>
    </section>

    <div class="map-meta" id="map-meta" aria-live="polite"></div>

    <div class="canvas-wrap">
      <canvas id="city-canvas" aria-label="City grid"></canvas>
      <div id="ripple" class="ripple" hidden></div>
    </div>

    <div class="attempt-row" aria-label="Attempts remaining">
      <span class="attempt-dot" data-i="0"></span>
      <span class="attempt-dot" data-i="1"></span>
      <span class="attempt-dot" data-i="2"></span>
      <span class="attempt-label" id="attempt-label">Attempt 1 of 3</span>
    </div>

    <div class="log-wrap">
      <button id="inspect-btn" class="log-inspect-btn" type="button" aria-label="Inspect parsed instructions" title="Inspect parsed instructions">🔎</button>
      <section class="log" id="driver-log" aria-live="polite" aria-label="Driver narration"></section>
    </div>

    <section class="dispatch" id="dispatch-block">
      <div class="dispatch-head">
        <span class="dispatch-title">📻 Dispatch</span>
        <span class="dispatch-mode-tag" id="dispatch-mode-tag" hidden>SOLUTION</span>
        <span class="char-count" id="char-count" aria-live="polite">0</span>
      </div>
      <textarea id="dispatch-input" rows="3" placeholder="Type your route here…" autocomplete="off"></textarea>
      <button id="transmit-btn" class="btn btn-primary btn-wide" type="button">
        <span class="btn-label">📻 TRANSMIT</span>
        <span class="spinner" hidden></span>
      </button>
    </section>

    <section class="lockout" id="lockout-block" hidden>
      <p id="lockout-message">Route abandoned. Generate a new map to try again.</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" hidden></div>

  <div class="modal" id="actions-modal" hidden role="dialog" aria-modal="true" aria-labelledby="actions-modal-title">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="actions-modal-title">Parsed instructions</h2>
        <button class="modal-close" type="button" data-close aria-label="Close">×</button>
      </div>
      <div class="modal-body" id="actions-modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
